version: '3.8'

services:
  postgres:
    image: postgis/postgis:17-3.5
    container_name: lumen_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-lumen}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lumen_secret}
      POSTGRES_DB: ${DB_NAME:-lumen_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lumen}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lumen_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
